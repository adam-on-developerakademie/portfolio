<div class="footer">
    <div class="footerTop">
        <img src="ico/AP_bgw.png" alt="">
        <div class="middle">
            <h2 class="developer">{{myData.DATA.footer.developer[myData.DATA.language]}}</h2>
        </div>
        <div class="socials">
            @for(button of myData.DATA.footer.socialButtons.values; track button.name ) {
            <div class="button">
                <a [href]="button.link" target="_blank" rel="noopener noreferrer">
                    <img [src]="'ico/' + button.icon" [alt]="button.name" />
                </a>
            </div>
            }
        </div>
    </div>
    <div class="footerBottom">
        <!-- Legal navigation links to privacy and legal notice pages. -->
        <nav class="impressum">
            <a
                routerLink="/privacy-policy"
                [attr.data-text]="myData.DATA.language === 0 ? 'Privacy Policy' : 'Datenschutz'">
                {{ myData.DATA.language === 0 ? 'Privacy Policy' : 'Datenschutz' }}
            </a>
            <span class="separator">/</span>
            <a
                routerLink="/legal-notice"
                [attr.data-text]="myData.DATA.language === 0 ? 'Legal Notice' : 'Impressum'">
                {{ myData.DATA.language === 0 ? 'Legal Notice' : 'Impressum' }}
            </a>
        </nav>
    </div>
</div>
