<header>
    <img src="ico/AP_bgw.png" alt="Logo" class="logo" />
    <nav>
        <div class="links">

            @for(value of myData.DATA.header; track value.name ) {
            <div class="link">
                <div class="button" [class.bolder]="value.set">
                    <a (click)="goToOld(value.name); setUnderline(value.name)">{{value.values[myData.DATA.language]}}</a>
                    <div [class.underline]="myData.DATA.header[$index].set"></div>
                </div>
            </div>
            }
        </div>

        <div class="languages">
            <div class="button" [class.bolder]="myData.DATA.language === 1">
                <p (click)="this.myData.DATA.language = 1">{{myData.DATA.languages.values[1]}}</p>
                <div [class.underline]="myData.DATA.language === 1"></div>
            </div>
            /
            <div class="button" [class.bolder]="myData.DATA.language === 0">
                <p (click)="this.myData.DATA.language = 0">{{myData.DATA.languages.values[0]}}</p>
                <div [class.underline]="myData.DATA.language === 0"></div>
            </div>
        </div>
    </nav>
</header>
<div #aboutMe id="aboutMe" class="aboutMe"></div>
<div #skillSet id="skillSet" class="skillSet"></div>
<div #myWork id="myWork" class="myWork"></div>
