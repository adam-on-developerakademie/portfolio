<div #goToHeader class="goToHeader"></div>
<div class="contact">
    <div class="ball11"></div>
    <div class="ball12"></div>
    <div class="ball13"></div>
    <div class="ball14" (click)="goTo(goToHeader)"><img src="ico/ArrowUpWhite.png" alt="Arrow Up White"></div>


    <div class="contactContent">
        <h2 class="title">{{myData.DATA.contact.title[myData.DATA.language]}}</h2>
        <p class="ask">{{myData.DATA.contact.ask[myData.DATA.language]}}</p>
        <p class="description">{{myData.DATA.contact.description[myData.DATA.language]}}</p>
        <a class="contactMe"
            href="mailto:adam.piskorek@gmx.com">{{myData.DATA.contact.contactMe[0][myData.DATA.language]}} <span>{{myData.DATA.contact.contactMe[1][myData.DATA.language]}}</span></a>

        <form class="contactForm" novalidate>
            <input class="field" type="text" placeholder="Your name" />
            <input class="field" type="email" placeholder="Your email" />
            <textarea class="field message" placeholder="Your message"></textarea>

            <label class="policyRow">
                <input type="checkbox" />
                <span>I have read the privacy policy and agree to the processing of my data as outlined.</span>
            </label>

            <button type="button" class="submitButton">Say hello ;)</button>
        </form>
    </div>
</div>
